<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Perks Loading State</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d421",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102212",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                    animation: {
                        shimmer: "shimmer 1.5s infinite linear",
                    },
                    keyframes: {
                        shimmer: {
                            "0%": { backgroundPosition: "-1000px 0" },
                            "100%": { backgroundPosition: "1000px 0" },
                        },
                    },
                },
            },
        }
    </script>
<style>
        .animate-shimmer {
            background: linear-gradient(to right, #28392a 8%, #364938 18%, #28392a 33%);
            background-size: 1000px 100%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-x-hidden antialiased">
<div class="relative flex h-full min-h-screen w-full flex-col justify-between overflow-x-hidden">
<!-- Main Content Area -->
<div class="flex-1 flex flex-col">
<!-- Header / Search Skeleton -->
<div class="px-4 py-3 pt-6">
<div class="h-12 w-full rounded-lg animate-shimmer"></div>
</div>
<!-- Category Chips Skeleton -->
<div class="flex gap-3 px-4 py-2 overflow-x-hidden no-scrollbar">
<div class="h-8 w-24 shrink-0 rounded-full animate-shimmer"></div>
<div class="h-8 w-20 shrink-0 rounded-full animate-shimmer"></div>
<div class="h-8 w-28 shrink-0 rounded-full animate-shimmer"></div>
<div class="h-8 w-24 shrink-0 rounded-full animate-shimmer"></div>
<div class="h-8 w-20 shrink-0 rounded-full animate-shimmer"></div>
</div>
<!-- Featured Perk Skeleton -->
<div class="p-4">
<div class="flex flex-col gap-3 rounded-xl bg-[#1c271c] p-3 shadow-sm border border-[#28392a]/50">
<div class="aspect-video w-full rounded-lg animate-shimmer"></div>
<div class="flex flex-col gap-2 pt-2">
<div class="h-5 w-3/4 rounded animate-shimmer"></div>
<div class="h-4 w-1/2 rounded animate-shimmer opacity-60"></div>
</div>
</div>
</div>
<!-- List Header Skeleton -->
<div class="px-4 py-2 flex justify-between items-center">
<div class="h-5 w-32 rounded animate-shimmer"></div>
<div class="h-4 w-16 rounded animate-shimmer opacity-60"></div>
</div>
<!-- Perk List Items Skeleton -->
<div class="flex flex-col">
<!-- Item 1 -->
<div class="flex items-center gap-4 border-b border-[#28392a]/30 px-4 py-4">
<div class="size-14 shrink-0 rounded-lg animate-shimmer"></div>
<div class="flex flex-1 flex-col gap-2">
<div class="h-4 w-2/3 rounded animate-shimmer"></div>
<div class="h-3 w-1/2 rounded animate-shimmer opacity-60"></div>
</div>
<div class="h-8 w-16 rounded-full animate-shimmer opacity-40"></div>
</div>
<!-- Item 2 -->
<div class="flex items-center gap-4 border-b border-[#28392a]/30 px-4 py-4">
<div class="size-14 shrink-0 rounded-lg animate-shimmer"></div>
<div class="flex flex-1 flex-col gap-2">
<div class="h-4 w-3/4 rounded animate-shimmer"></div>
<div class="h-3 w-1/3 rounded animate-shimmer opacity-60"></div>
</div>
<div class="h-8 w-16 rounded-full animate-shimmer opacity-40"></div>
</div>
<!-- Item 3 -->
<div class="flex items-center gap-4 border-b border-[#28392a]/30 px-4 py-4">
<div class="size-14 shrink-0 rounded-lg animate-shimmer"></div>
<div class="flex flex-1 flex-col gap-2">
<div class="h-4 w-1/2 rounded animate-shimmer"></div>
<div class="h-3 w-2/3 rounded animate-shimmer opacity-60"></div>
</div>
<div class="h-8 w-16 rounded-full animate-shimmer opacity-40"></div>
</div>
<!-- Item 4 -->
<div class="flex items-center gap-4 border-b border-[#28392a]/30 px-4 py-4">
<div class="size-14 shrink-0 rounded-lg animate-shimmer"></div>
<div class="flex flex-1 flex-col gap-2">
<div class="h-4 w-3/5 rounded animate-shimmer"></div>
<div class="h-3 w-2/5 rounded animate-shimmer opacity-60"></div>
</div>
<div class="h-8 w-16 rounded-full animate-shimmer opacity-40"></div>
</div>
</div>
</div>
<!-- Bottom Navigation -->
<div class="sticky bottom-0 z-10 flex w-full border-t border-[#28392a] bg-[#1c271c]/95 backdrop-blur px-4 pb-safe pt-2">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-[#9db99f] hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">home</span>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-white" href="#">
<span class="material-symbols-outlined text-2xl fill-current">star</span>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Perks</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-[#9db99f] hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">account_balance_wallet</span>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Wallet</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-[#9db99f] hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-2xl">person</span>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Profile</p>
</a>
</div>
</div>
</body></html>
