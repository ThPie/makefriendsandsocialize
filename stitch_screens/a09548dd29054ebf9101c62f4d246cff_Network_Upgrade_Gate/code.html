<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Network Upgrade Gate</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Newsreader -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a5b2a",
                        "background-light": "#f6f8f6",
                        "background-dark": "#131f16",
                        "gold": "#D4AF37",
                        "surface-dark": "#1c2e21",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom Checkbox Style for Gold Theme */
        .gold-check:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='%23131f16' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
            background-color: #D4AF37;
            border-color: #D4AF37;
        }
        
        /* Shimmer Effect for Crown */
        @keyframes shimmer {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.8; transform: scale(1); }
        }
        .crown-shimmer {
            animation: shimmer 3s infinite ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
<!-- Background Texture/Gradient -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-40">
<div class="absolute inset-0 bg-gradient-to-b from-[#1a5b2a]/10 to-black"></div>
<div class="absolute top-0 left-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 mix-blend-overlay"></div>
</div>
<!-- Close Button (Top Right) -->
<button class="absolute top-6 right-6 z-20 text-white/60 hover:text-white transition-colors p-2 rounded-full hover:bg-white/10">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<!-- Main Upgrade Card -->
<div class="relative z-10 w-full max-w-sm bg-surface-dark/90 backdrop-blur-md border border-[#1a5b2a]/30 rounded-2xl shadow-2xl shadow-black/50 overflow-hidden flex flex-col">
<!-- Decorative Top Gradient -->
<div class="h-2 w-full bg-gradient-to-r from-primary via-gold to-primary"></div>
<div class="flex flex-col items-center pt-10 pb-6 px-6 text-center">
<!-- Hero Icon: Gold Crown -->
<div class="mb-6 relative">
<div class="absolute inset-0 bg-gold blur-2xl opacity-20 rounded-full"></div>
<div class="crown-shimmer text-gold relative z-10 drop-shadow-[0_0_15px_rgba(212,175,55,0.4)]">
<span class="material-symbols-outlined" style="font-size: 80px; font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                        crown
                    </span>
</div>
</div>
<!-- Headlines -->
<h1 class="text-white text-[32px] font-medium italic leading-tight mb-3">
                Unlock The Network
            </h1>
<p class="text-white/70 text-base font-normal leading-relaxed px-2">
                Fellows get exclusive access to our global directory of industry leaders.
            </p>
</div>
<!-- Benefits List -->
<div class="px-8 pb-8 space-y-5">
<div class="flex items-center gap-4 group">
<div class="flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-full bg-primary/20 text-gold border border-gold/30">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
<p class="text-white/90 text-[17px] font-normal group-hover:text-white transition-colors">View full member profiles</p>
</div>
<div class="flex items-center gap-4 group">
<div class="flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-full bg-primary/20 text-gold border border-gold/30">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
<p class="text-white/90 text-[17px] font-normal group-hover:text-white transition-colors">Direct messaging privileges</p>
</div>
<div class="flex items-center gap-4 group">
<div class="flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-full bg-primary/20 text-gold border border-gold/30">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
<p class="text-white/90 text-[17px] font-normal group-hover:text-white transition-colors">Access to city-specific chapters</p>
</div>
<div class="flex items-center gap-4 group">
<div class="flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-full bg-primary/20 text-gold border border-gold/30">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
<p class="text-white/90 text-[17px] font-normal group-hover:text-white transition-colors">Priority event booking</p>
</div>
</div>
<!-- Pricing & Action -->
<div class="bg-black/20 p-6 flex flex-col gap-4 border-t border-white/5">
<button class="w-full bg-primary hover:bg-[#154a22] text-white text-lg font-medium py-4 rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
<span>Upgrade to Fellow</span>
<span class="w-1 h-1 bg-white/40 rounded-full mx-1"></span>
<span class="opacity-90 font-normal">$49/mo</span>
<span class="material-symbols-outlined text-white/70 group-hover:translate-x-1 transition-transform" style="font-size: 20px;">arrow_forward</span>
</button>
<div class="flex items-center justify-center gap-6">
<button class="text-white/40 text-sm font-medium hover:text-white/60 transition-colors">Restore Purchases</button>
<button class="text-white/40 text-sm font-medium hover:text-white/60 transition-colors">Terms of Service</button>
</div>
</div>
</div>
<!-- Bottom "Maybe Later" Link (Outside Card) -->
<div class="absolute bottom-8 left-0 w-full flex justify-center z-10">
<button class="text-white/30 text-sm font-medium hover:text-white transition-colors border-b border-transparent hover:border-white/30 pb-0.5">
            Maybe later
        </button>
</div>
</body></html>
