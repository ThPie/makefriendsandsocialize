<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding: Professional</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec49",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102215",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display antialiased min-h-screen flex flex-col overflow-x-hidden selection:bg-primary/30">
<!-- Top App Bar -->
<header class="flex items-center justify-between p-4 pb-2 sticky top-0 z-10 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm">
<button class="text-slate-900 dark:text-white flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-600 dark:text-slate-400 text-sm font-semibold tracking-wide uppercase">Step 2 of 5</h2>
<div class="size-10"></div> <!-- Spacer for centering -->
</header>
<!-- Progress Bar -->
<div class="px-6 py-2">
<div class="relative h-1.5 w-full rounded-full bg-slate-200 dark:bg-white/10 overflow-hidden">
<div class="absolute top-0 left-0 h-full bg-primary rounded-full transition-all duration-1000 ease-out" style="width: 40%"></div>
</div>
</div>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-6 pt-6 pb-24 max-w-md mx-auto w-full">
<!-- Header Text -->
<div class="mb-8 animate-fade-in-up">
<h1 class="text-3xl md:text-4xl font-bold leading-tight mb-3 tracking-tight">Your Professional Identity</h1>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed">
                Tell us what you do. This helps our algorithm suggest relevant connections and exclusive groups.
            </p>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Job Title Input -->
<div class="flex flex-col gap-2 group">
<label class="text-sm font-medium text-slate-700 dark:text-slate-200 group-focus-within:text-primary transition-colors" for="job-title">Current Job Title</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 group-focus-within:text-primary transition-colors material-symbols-outlined text-[20px]">
                        work
                    </span>
<input class="w-full bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl py-4 pl-12 pr-4 text-base placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200" id="job-title" placeholder="e.g. Product Manager" type="text"/>
</div>
</div>
<!-- Company Input -->
<div class="flex flex-col gap-2 group">
<label class="text-sm font-medium text-slate-700 dark:text-slate-200 group-focus-within:text-primary transition-colors" for="company">Company</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 group-focus-within:text-primary transition-colors material-symbols-outlined text-[20px]">
                        business
                    </span>
<input class="w-full bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl py-4 pl-12 pr-4 text-base placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200" id="company" placeholder="e.g. Acme Corp" type="text"/>
</div>
</div>
<!-- Industry Dropdown -->
<div class="flex flex-col gap-2 group relative">
<label class="text-sm font-medium text-slate-700 dark:text-slate-200 group-focus-within:text-primary transition-colors" for="industry">Industry</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 group-focus-within:text-primary transition-colors material-symbols-outlined text-[20px]">
                        domain
                    </span>
<select class="w-full bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 rounded-xl py-4 pl-12 pr-10 text-base text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200 appearance-none cursor-pointer" id="industry">
<option class="text-slate-400" disabled="" selected="" value="">Select an industry...</option>
<option class="bg-background-light dark:bg-background-dark" value="tech">Technology</option>
<option class="bg-background-light dark:bg-background-dark" value="finance">Finance</option>
<option class="bg-background-light dark:bg-background-dark" value="healthcare">Healthcare</option>
<option class="bg-background-light dark:bg-background-dark" value="education">Education</option>
<option class="bg-background-light dark:bg-background-dark" value="creative">Creative Arts</option>
</select>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none material-symbols-outlined">
                        expand_more
                    </span>
</div>
</div>
</form>
</main>
<!-- Bottom Navigation -->
<footer class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark dark:to-transparent pt-12">
<div class="max-w-md mx-auto flex items-center justify-between gap-4">
<button class="px-6 py-4 text-slate-500 dark:text-slate-400 font-semibold hover:text-slate-900 dark:hover:text-white transition-colors">
                Skip
            </button>
<button class="flex-1 bg-primary hover:bg-[#0fd641] text-background-dark font-bold text-lg py-4 px-6 rounded-xl shadow-[0_4px_14px_0_rgba(19,236,73,0.39)] hover:shadow-[0_6px_20px_rgba(19,236,73,0.23)] hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center gap-2 group">
                Continue
                <span class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</div>
</footer>
</body></html>
