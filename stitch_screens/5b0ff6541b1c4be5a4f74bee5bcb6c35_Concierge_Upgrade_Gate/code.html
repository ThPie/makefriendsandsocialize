<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Concierge Upgrade Gate</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d421",
                        "primary-dark": "#0ea61a",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102212",
                        "surface-dark": "#1a2e1d", // Slightly lighter green for card
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem", 
                        "lg": "0.5rem", 
                        "xl": "0.75rem", 
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar hide for clean mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-display text-white">
<!-- Ambient Background Effects -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[100px] mix-blend-screen"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[80px] mix-blend-screen"></div>
</div>
<!-- Close Button (Top Right) -->
<button class="absolute top-6 right-6 z-20 p-2 rounded-full bg-white/5 hover:bg-white/10 transition-colors text-white/70 hover:text-white">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<!-- Main Card Container -->
<div class="relative z-10 w-full max-w-md bg-surface-dark/90 backdrop-blur-xl border border-white/5 shadow-2xl rounded-3xl overflow-hidden flex flex-col items-center">
<!-- Hero Visual Area -->
<div class="w-full relative h-48 bg-gradient-to-b from-primary/20 to-surface-dark flex items-center justify-center p-8">
<!-- Glow effect behind the gem -->
<div class="absolute w-24 h-24 bg-yellow-500/20 rounded-full blur-2xl"></div>
<!-- Gem Icon Representation (using Material Symbol with gold gradient effect) -->
<div class="relative">
<span class="material-symbols-outlined text-[80px] leading-none text-transparent bg-clip-text bg-gradient-to-br from-yellow-200 via-yellow-400 to-yellow-600 drop-shadow-[0_4px_10px_rgba(234,179,8,0.3)]" style="font-variation-settings: 'FILL' 1, 'wght' 400;">
                    diamond
                </span>
<!-- Sparkle accents -->
<span class="material-symbols-outlined absolute -top-2 -right-4 text-yellow-200 text-xl animate-pulse">
                    flare
                </span>
<span class="material-symbols-outlined absolute bottom-0 -left-6 text-yellow-400/70 text-sm animate-pulse" style="animation-delay: 0.5s;">
                    auto_awesome
                </span>
</div>
</div>
<!-- Content Area -->
<div class="px-8 pb-8 pt-2 w-full flex flex-col items-center text-center">
<div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-gradient-to-r from-yellow-500/10 to-yellow-500/5 border border-yellow-500/20 mb-6">
<span class="material-symbols-outlined text-yellow-400 text-sm">workspace_premium</span>
<span class="text-xs font-semibold tracking-wider text-yellow-400 uppercase">Fellow Access</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white mb-3">
                Elevate Your Experience
            </h1>
<p class="text-white/70 text-base leading-relaxed mb-8 max-w-[280px]">
                Unlock your personalized 24/7 Concierge—handling your reservations, travel, and exclusive requests instantly.
            </p>
<!-- Feature List (Subtle) -->
<div class="w-full space-y-3 mb-8 text-left bg-white/5 rounded-xl p-5 border border-white/5">
<div class="flex items-start gap-3">
<div class="bg-primary/20 p-1 rounded-full">
<span class="material-symbols-outlined text-primary text-sm font-bold">check</span>
</div>
<span class="text-sm text-white/90">Priority Restaurant Reservations</span>
</div>
<div class="flex items-start gap-3">
<div class="bg-primary/20 p-1 rounded-full">
<span class="material-symbols-outlined text-primary text-sm font-bold">check</span>
</div>
<span class="text-sm text-white/90">Exclusive Event Access</span>
</div>
<div class="flex items-start gap-3">
<div class="bg-primary/20 p-1 rounded-full">
<span class="material-symbols-outlined text-primary text-sm font-bold">check</span>
</div>
<span class="text-sm text-white/90">24/7 Dedicated Support Agent</span>
</div>
</div>
<!-- Primary Action -->
<button class="w-full group relative overflow-hidden rounded-xl bg-primary hover:bg-primary-dark transition-all duration-300 transform active:scale-[0.98] shadow-[0_0_20px_rgba(17,212,33,0.3)]">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
<div class="px-6 py-4 flex items-center justify-center gap-2">
<span class="text-background-dark font-bold text-lg">Upgrade to Fellow</span>
<span class="material-symbols-outlined text-background-dark">arrow_forward</span>
</div>
</button>
<!-- Secondary Action -->
<button class="mt-4 text-sm font-medium text-white/40 hover:text-white transition-colors py-2">
                Maybe later
            </button>
</div>
</div>
</body></html>
