<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding: Goals</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#14b83d",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112115",
                        "gold": "#D4AF37", // Added for the requested gold border
                        "forest-green": "#0b3d1d", // Added for the requested forest green fill
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom checkbox hidden but accessible */
        .peer:checked ~ .card-content {
            background-color: #1a4d2e; /* Forest green shade */
            border-color: #D4AF37; /* Gold */
        }
        .peer:checked ~ .card-content .check-icon {
            opacity: 1;
            transform: scale(1);
        }
        .peer:checked ~ .card-content .icon-wrapper {
             background-color: rgba(20, 184, 61, 0.2);
             color: #14b83d;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex flex-col overflow-hidden relative">
<!-- Top Status Bar Area (Mockup for iOS feel) -->
<div class="h-12 w-full shrink-0"></div>
<!-- Navigation Header -->
<div class="flex items-center justify-between px-4 pb-2 pt-2">
<button class="text-white hover:text-primary transition-colors flex size-10 items-center justify-center rounded-full active:bg-white/10">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios_new</span>
</button>
<button class="text-white/60 hover:text-white text-base font-medium leading-normal shrink-0 px-2 py-1 transition-colors">
            Skip
        </button>
</div>
<!-- Progress Bar -->
<div class="px-6 py-4">
<div class="flex items-center justify-between mb-2">
<span class="text-xs font-semibold text-primary uppercase tracking-wider">Step 3 of 5</span>
<span class="text-xs font-medium text-white/40">60%</span>
</div>
<div class="h-2 w-full rounded-full bg-white/10 overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-500 ease-out" style="width: 60%;"></div>
</div>
</div>
<!-- Main Content Area -->
<div class="flex-1 overflow-y-auto px-6 pb-24 scrollbar-hide">
<div class="flex flex-col gap-2 mb-8">
<h1 class="text-white text-[32px] font-bold leading-tight tracking-tight">What brings you here?</h1>
<p class="text-white/60 text-lg font-normal leading-relaxed">Select all that apply to help us curate your feed.</p>
</div>
<div class="flex flex-col gap-4">
<!-- Option 1 -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="goals" type="checkbox" value="network"/>
<div class="card-content flex items-center p-4 rounded-xl border border-white/10 bg-white/5 transition-all duration-300 hover:bg-white/10 active:scale-[0.98]">
<div class="icon-wrapper flex items-center justify-center size-12 rounded-full bg-white/5 text-white/80 transition-colors mr-4 shrink-0">
<span class="material-symbols-outlined">groups</span>
</div>
<div class="flex-1">
<h3 class="text-white text-lg font-semibold leading-tight mb-0.5">Expand My Network</h3>
<p class="text-white/40 text-sm">Connect with professionals</p>
</div>
<div class="check-icon opacity-0 scale-50 transition-all duration-300 absolute top-4 right-4 text-[#D4AF37]">
<span class="material-symbols-outlined fill-1">check_circle</span>
</div>
</div>
</label>
<!-- Option 2 (Pre-selected for demo) -->
<label class="relative group cursor-pointer">
<input checked="" class="peer sr-only" name="goals" type="checkbox" value="social"/>
<div class="card-content flex items-center p-4 rounded-xl border border-white/10 bg-white/5 transition-all duration-300 hover:bg-white/10 active:scale-[0.98]">
<div class="icon-wrapper flex items-center justify-center size-12 rounded-full bg-white/5 text-white/80 transition-colors mr-4 shrink-0">
<span class="material-symbols-outlined">celebration</span>
</div>
<div class="flex-1">
<h3 class="text-white text-lg font-semibold leading-tight mb-0.5">Attend Social Events</h3>
<p class="text-white/40 text-sm">Parties, mixers &amp; more</p>
</div>
<div class="check-icon opacity-0 scale-50 transition-all duration-300 absolute top-4 right-4 text-[#D4AF37]">
<span class="material-symbols-outlined fill-1">check_circle</span>
</div>
</div>
</label>
<!-- Option 3 -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="goals" type="checkbox" value="dating"/>
<div class="card-content flex items-center p-4 rounded-xl border border-white/10 bg-white/5 transition-all duration-300 hover:bg-white/10 active:scale-[0.98]">
<div class="icon-wrapper flex items-center justify-center size-12 rounded-full bg-white/5 text-white/80 transition-colors mr-4 shrink-0">
<span class="material-symbols-outlined">favorite</span>
</div>
<div class="flex-1">
<h3 class="text-white text-lg font-semibold leading-tight mb-0.5">Find a Partner</h3>
<p class="text-white/40 text-sm">Slow dating approach</p>
</div>
<div class="check-icon opacity-0 scale-50 transition-all duration-300 absolute top-4 right-4 text-[#D4AF37]">
<span class="material-symbols-outlined fill-1">check_circle</span>
</div>
</div>
</label>
<!-- Option 4 -->
<label class="relative group cursor-pointer">
<input class="peer sr-only" name="goals" type="checkbox" value="business"/>
<div class="card-content flex items-center p-4 rounded-xl border border-white/10 bg-white/5 transition-all duration-300 hover:bg-white/10 active:scale-[0.98]">
<div class="icon-wrapper flex items-center justify-center size-12 rounded-full bg-white/5 text-white/80 transition-colors mr-4 shrink-0">
<span class="material-symbols-outlined">handshake</span>
</div>
<div class="flex-1">
<h3 class="text-white text-lg font-semibold leading-tight mb-0.5">Business Synergy</h3>
<p class="text-white/40 text-sm">Partnerships &amp; deals</p>
</div>
<div class="check-icon opacity-0 scale-50 transition-all duration-300 absolute top-4 right-4 text-[#D4AF37]">
<span class="material-symbols-outlined fill-1">check_circle</span>
</div>
</div>
</label>
</div>
</div>
<!-- Sticky Bottom Navigation -->
<div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background-dark via-background-dark/95 to-transparent pt-12">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold text-lg h-14 rounded-full shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
            Continue
            <span class="material-symbols-outlined text-[20px] font-bold">arrow_forward</span>
</button>
</div>
</body></html>
