<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Slide-over Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f9d406",
                        "background-light": "#f8f8f5",
                        "background-dark": "#23200f",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display overflow-hidden">
<!-- Slide-over Menu Container -->
<div class="relative flex h-screen w-full flex-col overflow-hidden bg-background-light dark:bg-background-dark">
<!-- Header with Close Button & Profile Summary -->
<header class="flex items-center justify-between px-6 pt-12 pb-6">
<!-- User Profile Summary (Top Left) -->
<div class="flex items-center gap-4">
<div class="relative">
<div class="h-12 w-12 rounded-full bg-cover bg-center ring-2 ring-primary/50" data-alt="Professional woman portrait" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA3yLINa8o6BvkJPEgSNhQS6kx_AulgWn7D6wGYhXR37DsTGOdYQVDwgkyll9fFj6GZHWni6D4jASLU2SKexpSHpLsllAwHzb9qRd4ZFB0gkbmF85b6O7DEzkJktnXgM7CO6hYDNlhOyNme-WCFK3cFhezMFinfGraDW_FeQQ7NzeEaeGa3C_1Pd8lHVnBJ1QG1Kc0ByayDkSyLyRp8LMwclXY0WB1C--bptodFTIcH0b1f6YFdjp7Jwmy6NaU916RLDlK0pagThPw");'>
</div>
<div class="absolute bottom-0 right-0 h-3 w-3 rounded-full bg-primary border-2 border-background-light dark:border-background-dark"></div>
</div>
<div class="flex flex-col">
<span class="text-lg font-bold leading-tight">Jane Doe</span>
<span class="text-sm font-medium text-slate-500 dark:text-primary/70">Super Admin</span>
</div>
</div>
<!-- Close Button -->
<button class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-200/50 dark:bg-white/10 text-slate-900 dark:text-white transition hover:bg-slate-300 dark:hover:bg-white/20">
<span class="material-symbols-outlined" style="font-size: 24px;">close</span>
</button>
</header>
<!-- Navigation Links -->
<nav class="flex-1 overflow-y-auto px-4 py-4">
<ul class="flex flex-col gap-2">
<!-- Item: Dashboard -->
<li>
<a class="group flex items-center gap-4 rounded-xl px-4 py-3 text-slate-600 dark:text-slate-300 transition-all hover:bg-slate-200/50 dark:hover:bg-white/5" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">dashboard</span>
<span class="text-base font-semibold tracking-wide">Dashboard</span>
</a>
</li>
<!-- Item: Applications (Active) -->
<li>
<a class="group flex items-center justify-between rounded-xl bg-primary/10 px-4 py-3 text-primary transition-all relative overflow-hidden" href="#">
<!-- Active Indicator Bar -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary rounded-r-full"></div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary fill-1">folder_open</span>
<span class="text-base font-bold tracking-wide">Applications</span>
</div>
<div class="flex h-6 w-6 items-center justify-center rounded-full bg-primary text-xs font-bold text-background-dark">
                            3
                        </div>
</a>
</li>
<!-- Item: Members -->
<li>
<a class="group flex items-center gap-4 rounded-xl px-4 py-3 text-slate-600 dark:text-slate-300 transition-all hover:bg-slate-200/50 dark:hover:bg-white/5" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">group</span>
<span class="text-base font-semibold tracking-wide">Members</span>
</a>
</li>
<!-- Item: Events -->
<li>
<a class="group flex items-center gap-4 rounded-xl px-4 py-3 text-slate-600 dark:text-slate-300 transition-all hover:bg-slate-200/50 dark:hover:bg-white/5" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">calendar_month</span>
<span class="text-base font-semibold tracking-wide">Events</span>
</a>
</li>
<!-- Item: Dating -->
<li>
<a class="group flex items-center gap-4 rounded-xl px-4 py-3 text-slate-600 dark:text-slate-300 transition-all hover:bg-slate-200/50 dark:hover:bg-white/5" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">favorite</span>
<span class="text-base font-semibold tracking-wide">Dating</span>
</a>
</li>
<!-- Item: Analytics -->
<li>
<a class="group flex items-center gap-4 rounded-xl px-4 py-3 text-slate-600 dark:text-slate-300 transition-all hover:bg-slate-200/50 dark:hover:bg-white/5" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">bar_chart</span>
<span class="text-base font-semibold tracking-wide">Analytics</span>
</a>
</li>
<!-- Item: Perks -->
<li>
<a class="group flex items-center gap-4 rounded-xl px-4 py-3 text-slate-600 dark:text-slate-300 transition-all hover:bg-slate-200/50 dark:hover:bg-white/5" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">redeem</span>
<span class="text-base font-semibold tracking-wide">Perks</span>
</a>
</li>
</ul>
</nav>
<!-- Footer Actions -->
<div class="px-4 pb-8 pt-4">
<div class="mb-4 h-px w-full bg-slate-200 dark:bg-white/10"></div>
<ul class="flex flex-col gap-2">
<!-- Settings -->
<li>
<a class="group flex items-center gap-4 rounded-xl px-4 py-3 text-slate-600 dark:text-slate-300 transition-all hover:bg-slate-200/50 dark:hover:bg-white/5" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">settings</span>
<span class="text-base font-semibold tracking-wide">Settings</span>
</a>
</li>
<!-- Logout -->
<li>
<button class="flex w-full items-center gap-4 rounded-xl px-4 py-3 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 transition-colors">
<span class="material-symbols-outlined">logout</span>
<span class="text-base font-semibold tracking-wide">Log Out</span>
</button>
</li>
</ul>
<!-- App Version -->
<div class="mt-6 px-4">
<p class="text-xs font-medium text-slate-400 dark:text-slate-600">Admin Dashboard v2.4.0</p>
</div>
</div>
</div>
</body></html>
