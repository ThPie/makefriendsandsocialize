<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Android Event Notification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d421",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102212",
                        "surface-dark": "#2d342e", // Custom surface color derived from dark green hue
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "2xl": "1.75rem", "3xl": "2.25rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-hidden h-screen w-screen flex flex-col relative">
<!-- Background Wallpaper -->
<div class="absolute inset-0 z-0 bg-cover bg-center brightness-50" data-alt="Abstract dark aesthetic wallpaper with subtle geometric shapes" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDFgFCKpY2yOG8NXSst8GmO_LLQt1Np41uH0_GMB20GDP04yGWz_ICn6rsniEheiaLl1f3n1qMk-bBnI_xnoB8uMA09HVRFOHeLXBubH3sd46Gg-TSxT1mxF40Qt0bUbdCJ87vETBDQcPSqbKqEFmHWMm6vyPBw39A7do_CjJ_YF_FaHX1TyiasoB_qPjDTela9Iu9SX5oRLdP4Y8y0LuHhPdW1IoRaKEv6grOsgbJ8ItWbYCFbqrR06BbMAIZO88bA5PyfebAgaYI");'></div>
<!-- Android Status Bar Simulation -->
<div class="relative z-20 flex justify-between items-center px-6 py-3 text-gray-200 text-sm font-medium">
<span>09:41</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-base">signal_cellular_alt</span>
<span class="material-symbols-outlined text-base">wifi</span>
<span class="material-symbols-outlined text-base">battery_full</span>
</div>
</div>
<!-- Notification Area Container -->
<div class="relative z-10 w-full px-4 pt-2">
<!-- Main Notification Card -->
<!-- Using a slightly transparent dark surface to mimic Material You surface colors -->
<div class="w-full max-w-md mx-auto bg-[#2b302c]/95 backdrop-blur-md rounded-3xl overflow-hidden shadow-lg border border-white/5">
<!-- Notification Header -->
<div class="flex items-center justify-between px-4 pt-4 pb-2">
<div class="flex items-center gap-3">
<!-- App Icon -->
<div class="w-6 h-6 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-sm">diamond</span>
</div>
<!-- App Name & Bullet -->
<div class="flex items-center gap-2">
<span class="text-gray-300 text-sm font-medium">Private Society</span>
<span class="text-gray-500 text-xs">•</span>
<span class="text-gray-400 text-sm">now</span>
</div>
</div>
<!-- Expand Icon -->
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5">
<span class="material-symbols-outlined text-gray-400 text-lg">expand_more</span>
</button>
</div>
<!-- Content Area -->
<div class="px-4 pb-4 flex gap-4">
<div class="flex-1 flex flex-col gap-1">
<!-- Title -->
<h2 class="text-white text-lg font-bold leading-tight">Evening Social Tonight</h2>
<!-- Subtitle / Time location -->
<p class="text-primary font-medium text-sm">7:00 PM | The Library Lounge</p>
<!-- Body Text -->
<p class="text-gray-300 text-sm leading-snug mt-1">
                        You have successfully RSVP’d. We look forward to seeing you there.
                    </p>
</div>
<!-- Optional: Thumbnail Image for the event (common in rich notifications) -->
<div class="w-16 h-16 rounded-xl bg-cover bg-center shrink-0 mt-1 shadow-inner border border-white/10" data-alt="Cocktail glass in a moody dark lounge setting" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAni1ylHV3ukBJ2hgpeqTfYHkCRUzcA31hVuGEXHCB2eOTpRNgS6FtuP2xDCD-3y70pugdqui4Vxh1GmAaSKeEhB5yRPGkls5yTxRLznludVmNgctpbVdqWxX-8owZGRaxTN5_l55bB5P5YZchXzHgP722oJXS3qDXzl5qrgzg2A_SZQgPeNlDNN6QaxgZQ5BJrVd3Ld2cc3sUGmGXwucKOle1I1ABz1IVWlKMWHovHWvm9yRCZGRSIAWdh6IL5NpcMuPTOVvVXGN8");'></div>
</div>
<!-- Action Buttons Area -->
<!-- Material You style actions are often text buttons at the bottom -->
<div class="flex items-center justify-end gap-2 px-4 pb-4">
<button class="px-4 py-2 rounded-full text-primary hover:bg-primary/10 transition-colors text-sm font-semibold tracking-wide">
                    Get Directions
                </button>
<button class="px-4 py-2 rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors text-sm font-semibold tracking-wide">
                    View Event
                </button>
</div>
</div>
<!-- Secondary stacked notification (for visual context) -->
<div class="w-full max-w-md mx-auto mt-2 px-2">
<div class="h-2 bg-[#2b302c]/50 rounded-t-xl mx-4 backdrop-blur-sm"></div>
</div>
</div>
<!-- Decorative Bottom Gradient for the phone screen feel -->
<div class="absolute bottom-0 w-full h-32 bg-gradient-to-t from-black/80 to-transparent pointer-events-none z-10"></div>
<!-- Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/40 rounded-full z-20"></div>
</body></html>
