<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Member Registration V2</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a5b2a",
                        "background-light": "#f6f8f6",
                        "background-dark": "#131f16",
                        "glass-border": "rgba(255, 255, 255, 0.15)",
                        "glass-bg": "rgba(255, 255, 255, 0.05)",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(30, 45, 35, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-gradient {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex items-center justify-center p-4">
<!-- Background Gradient -->
<div class="fixed inset-0 z-0 bg-background-dark">
<!-- Abstract gradient blobs -->
<div class="absolute top-[-20%] left-[-20%] w-[80%] h-[60%] rounded-full bg-primary/40 blur-[120px] mix-blend-screen opacity-60"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[70%] h-[70%] rounded-full bg-primary/20 blur-[100px] mix-blend-screen opacity-40"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-md mx-auto">
<!-- Glassmorphism Card -->
<div class="glass-card rounded-xl p-6 md:p-8 flex flex-col gap-6 w-full">
<!-- Header Section -->
<div class="text-center space-y-2">
<span class="inline-block px-3 py-1 rounded-full border border-primary/30 bg-primary/10 text-primary-200 text-xs tracking-widest uppercase font-medium text-[#a2b4a6]">
                    Private Access
                </span>
<h1 class="text-white text-3xl md:text-4xl font-bold tracking-tight">
                    Membership<br/>Application
                </h1>
</div>
<!-- Social Proof Avatar Row -->
<div class="flex flex-col items-center gap-2 py-2">
<div class="flex items-center -space-x-3">
<div class="w-10 h-10 rounded-full border-2 border-[#131f16] bg-cover bg-center relative z-10" data-alt="Portrait of a young woman with a neutral expression" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCUypJ4FhjvZVWg_z1X0IhwMrR3SyMPGIp86fIMYL6mvp0xxqHS3uyFfauJNgXlyC3krSGbNhGPLLB8z6SZ4MGoLrF8qj4ZhGuQWbO9hlv2FxMVBn5raWdUhQCQGG2OK1MYQSoyj-ALsvuht5GN3l4uXpLc89fA9Wh8ZzlTJtQkOtp0OtNQBiv7UGXAQEY02LBLz_uswPuCmpZijbRerkuNzMlsIN04LFo9bEoGXUKDbkzuZFwDuy4WEOCAL7EQgxV6vA_RIUtsL14')"></div>
<div class="w-10 h-10 rounded-full border-2 border-[#131f16] bg-cover bg-center relative z-20" data-alt="Portrait of a smiling man in a suit" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDc65Ucq2_YE0jQo5EWvuX3tgK6jMfqKra2WLGWEiaSTEVztQue4KofXu9PWrI9KBh9AVwMe1UG9uzuTlHGAs1aHU5pBeE2EWq0AcNb2ypGUjEihE_fX_isl215de7X7BocFU669gF5Or_rEWfS28xle9lOS9UaJxaNSYQAg6vaz74-ehRmAd9swGVMytnz9BpTKlZ4iNJy1Iuz2hPxp17olGjRzTrtr1J6Ze1pR858bz3tG8Ddmu8SktTXBh6nc2egoav5LySaTqo')"></div>
<div class="w-10 h-10 rounded-full border-2 border-[#131f16] bg-cover bg-center relative z-30" data-alt="Portrait of a man looking to the side" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuASSpraRNUBuQnrRx8frcZhAhdTk2YaFfrv2F31-FJFq2_GATpEPXIUP4BsemaYKd6IZ8jUWcCDAW_lIwwR5s8c-npdkhnvOvUMiHkC7ZX6Ukowqcji_3hTZcX-QBwrhtuhDvTzp3eUqTFJcXxZhvZf8klL84m4q-27Q035Pl1cx66BOiYz1N34Sxy7wTwrGBWDqMfLn1KZTFaEMDdc308qNFwJAtG9E91oskSZ-RiCXb134-A3JcPdTaxCvqdlQRWHT3mB__trdk8')"></div>
<div class="w-10 h-10 rounded-full border-2 border-[#131f16] bg-cover bg-center relative z-40 bg-[#2b362e] flex items-center justify-center text-xs font-medium text-white">
                        +2k
                    </div>
</div>
<p class="text-[#a2b4a6] text-sm">Join 2,000+ exclusive members.</p>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-4 mt-2" onsubmit="event.preventDefault();">
<div class="space-y-1">
<label class="block text-xs font-medium text-gray-400 pl-1 uppercase tracking-wider" for="name">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-500 group-focus-within:text-white transition-colors">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-white/5 border border-white/10 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-primary/50 focus:border-primary/50 focus:bg-white/10 transition-all sm:text-sm" id="name" placeholder="e.g. Jonathan Doe" type="text"/>
</div>
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-gray-400 pl-1 uppercase tracking-wider" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-500 group-focus-within:text-white transition-colors">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-white/5 border border-white/10 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-primary/50 focus:border-primary/50 focus:bg-white/10 transition-all sm:text-sm" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<label class="block text-xs font-medium text-gray-400 pl-1 uppercase tracking-wider" for="password">Create Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-500 group-focus-within:text-white transition-colors">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-white/5 border border-white/10 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-primary/50 focus:border-primary/50 focus:bg-white/10 transition-all sm:text-sm" id="password" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-gray-500 hover:text-white transition-colors text-[20px]">visibility_off</span>
</div>
</div>
<!-- Password Strength Indicator -->
<div class="mt-2 space-y-1.5">
<div class="flex h-1 w-full overflow-hidden rounded-full bg-white/10">
<!-- Weak segment -->
<div class="h-full w-1/3 bg-red-500/80"></div>
<!-- Medium segment -->
<div class="h-full w-1/3 bg-yellow-500/80"></div>
<!-- Strong segment (Currently 'inactive' for demo look) -->
<div class="h-full w-1/3 bg-primary/20"></div>
</div>
<div class="flex justify-between items-center text-[10px] uppercase tracking-wider font-medium">
<span class="text-yellow-500">Medium Strength</span>
<span class="text-gray-500">Must include symbols</span>
</div>
</div>
</div>
<div class="pt-2">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-[#131f16] transition-all transform hover:scale-[1.01]" type="submit">
                        Request Invitation
                    </button>
</div>
</form>
<!-- Footer -->
<div class="text-center pt-2">
<p class="text-sm text-gray-400">
                    Already a member? 
                    <a class="font-medium text-white hover:text-primary transition-colors underline decoration-primary/50 underline-offset-4" href="#">
                        Log in
                    </a>
</p>
</div>
</div>
<!-- Decorative footer/legal -->
<div class="mt-8 text-center">
<p class="text-[10px] text-gray-600 uppercase tracking-widest">
                By invite only • Established 2024
            </p>
</div>
</main>
</body></html>
