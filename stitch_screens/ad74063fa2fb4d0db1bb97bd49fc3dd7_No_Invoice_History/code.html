<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>No Invoice History</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d421",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102212",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display antialiased selection:bg-primary/30 selection:text-primary">
<!-- Top Navigation Bar -->
<div class="sticky top-0 z-50 flex items-center justify-between px-4 py-4 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-primary/10">
<button class="flex items-center justify-center p-2 -ml-2 text-neutral-800 dark:text-neutral-200 hover:text-primary dark:hover:text-primary transition-colors rounded-full active:bg-primary/10">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold tracking-tight text-neutral-900 dark:text-white">Invoice History</h1>
<div class="w-10"></div> <!-- Spacer for optical centering -->
</div>
<!-- Main Content Area: Centered Empty State -->
<main class="flex-1 flex flex-col items-center justify-center px-6 pb-20">
<div class="w-full max-w-sm flex flex-col items-center text-center animate-in fade-in zoom-in duration-500">
<!-- Icon Wrapper -->
<div class="relative group mb-8">
<!-- Outer Glow/Ring -->
<div class="absolute -inset-4 bg-primary/20 rounded-full blur-xl opacity-50 group-hover:opacity-75 transition-opacity duration-500"></div>
<!-- Main Circle -->
<div class="relative flex items-center justify-center w-24 h-24 rounded-full bg-gradient-to-b from-primary/10 to-background-dark border border-primary/20 shadow-[0_0_30px_-5px_rgba(17,212,33,0.15)]">
<span class="material-symbols-outlined text-primary text-[40px] font-light">attach_money</span>
</div>
</div>
<!-- Text Content -->
<h2 class="text-2xl font-bold text-neutral-900 dark:text-white mb-3">No Invoices Yet</h2>
<p class="text-sm leading-relaxed text-neutral-600 dark:text-neutral-400 max-w-[280px]">
                Your first invoice will appear here once your membership cycle begins.
            </p>
<!-- Optional CTA for better UX -->
<button class="mt-8 px-6 py-2.5 rounded-full bg-primary/10 border border-primary/20 text-primary text-sm font-medium hover:bg-primary/20 active:scale-95 transition-all">
                View Membership Details
            </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-lg border-t border-primary/10 pb-safe pt-2">
<div class="flex items-center justify-around px-2 pb-4">
<!-- Home -->
<a class="flex flex-1 flex-col items-center gap-1 p-2 group" href="#">
<span class="material-symbols-outlined text-[24px] text-neutral-500 dark:text-neutral-400 group-hover:text-primary transition-colors">home</span>
<span class="text-[10px] font-medium text-neutral-500 dark:text-neutral-400 group-hover:text-primary transition-colors">Home</span>
</a>
<!-- Scan -->
<a class="flex flex-1 flex-col items-center gap-1 p-2 group" href="#">
<span class="material-symbols-outlined text-[24px] text-neutral-500 dark:text-neutral-400 group-hover:text-primary transition-colors">qr_code_scanner</span>
<span class="text-[10px] font-medium text-neutral-500 dark:text-neutral-400 group-hover:text-primary transition-colors">Scan</span>
</a>
<!-- Billing (Active) -->
<a class="flex flex-1 flex-col items-center gap-1 p-2 relative" href="#">
<!-- Active Indicator Glow -->
<div class="absolute top-1 w-8 h-8 bg-primary/20 rounded-full blur-md"></div>
<span class="material-symbols-outlined text-[24px] text-primary relative z-10 font-medium filled">credit_card</span>
<span class="text-[10px] font-medium text-primary relative z-10">Billing</span>
</a>
<!-- Profile -->
<a class="flex flex-1 flex-col items-center gap-1 p-2 group" href="#">
<span class="material-symbols-outlined text-[24px] text-neutral-500 dark:text-neutral-400 group-hover:text-primary transition-colors">person</span>
<span class="text-[10px] font-medium text-neutral-500 dark:text-neutral-400 group-hover:text-primary transition-colors">Profile</span>
</a>
</div>
</nav>
</body></html>
