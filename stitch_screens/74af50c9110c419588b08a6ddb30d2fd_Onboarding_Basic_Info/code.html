<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Basic Info</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#11d442",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102215", // Deep forest green background
                        "surface-dark": "#1a3322", // Slightly lighter for inputs
                        "gold-accent": "#D4AF37",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"],
                        "sans": ["Newsreader", "serif"] // Forcing the serif style as requested for elegance
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display min-h-screen flex flex-col items-center justify-between antialiased selection:bg-primary selection:text-black">
<!-- Main Content Wrapper -->
<div class="w-full max-w-md flex flex-col flex-grow px-6 py-4 relative">
<!-- Progress Indicators -->
<div class="flex w-full flex-row items-center justify-center gap-2 pt-2 pb-6">
<div class="h-1.5 flex-1 rounded-full bg-primary shadow-[0_0_10px_rgba(17,212,66,0.5)]"></div>
<div class="h-1.5 flex-1 rounded-full bg-surface-dark/50"></div>
<div class="h-1.5 flex-1 rounded-full bg-surface-dark/50"></div>
<div class="h-1.5 flex-1 rounded-full bg-surface-dark/50"></div>
<div class="h-1.5 flex-1 rounded-full bg-surface-dark/50"></div>
</div>
<!-- Header -->
<div class="text-center space-y-2 mb-8 animate-fade-in-up">
<h1 class="text-4xl font-medium tracking-tight text-white">Begin Your Journey</h1>
<p class="text-white/60 text-lg font-light">Let's start with the basics.</p>
</div>
<!-- Avatar Upload -->
<div class="flex flex-col items-center gap-4 mb-10">
<div class="relative group cursor-pointer">
<!-- Avatar Circle -->
<div class="relative h-32 w-32 rounded-full bg-surface-dark border-2 border-white/10 flex items-center justify-center overflow-hidden bg-cover bg-center shadow-2xl transition-all duration-300 group-hover:border-primary/50" data-alt="Abstract dark green moody portrait placeholder" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBCDr5Rvfye-exDZ68exs7qaocfjV1i6gs_jM5-w84jVcbyuqI_bQH_6pnFzkpLCvAP7Y7WmM5OsT1dNDcd_ad2WJ4xbF569QTLQJBQyAP7Zp9t8iAuDnH2Re1OZ63IAWseykYig6z--OoRv8lYHlrVs_3wGdf6jMMJHMLDOrg3CyJJlcgsIY40PzfHn5bBdfLi9pAv5V2t-KgreSU_F6V77nbjy478DkQLEYE4RLKYv2SM_Ofkp8D9w1pD7saHMe7MscRtaO1V8Wo');">
<!-- Overlay for empty state if needed, currently showing example image -->
<div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors"></div>
</div>
<!-- Gold Plus Button -->
<button class="absolute bottom-0 right-1 h-10 w-10 rounded-full bg-surface-dark border border-white/10 flex items-center justify-center shadow-lg hover:scale-110 transition-transform active:scale-95">
<span class="material-symbols-outlined text-gold-accent" style="font-size: 24px;">add_a_photo</span>
</button>
</div>
<p class="text-white/50 text-sm font-medium tracking-wide uppercase">Add Photo</p>
</div>
<!-- Form Inputs -->
<div class="flex flex-col gap-5 w-full">
<!-- First Name -->
<label class="group flex flex-col gap-2">
<span class="text-white/80 text-base font-medium ml-1">First Name</span>
<div class="relative flex items-center">
<input class="w-full h-14 rounded-xl bg-surface-dark border border-white/10 px-4 pl-12 text-lg text-white placeholder:text-white/30 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all" placeholder="Enter your first name" type="text"/>
<span class="material-symbols-outlined absolute left-4 text-white/40 group-focus-within:text-primary transition-colors">person</span>
</div>
</label>
<!-- Last Name -->
<label class="group flex flex-col gap-2">
<span class="text-white/80 text-base font-medium ml-1">Last Name</span>
<div class="relative flex items-center">
<input class="w-full h-14 rounded-xl bg-surface-dark border border-white/10 px-4 pl-12 text-lg text-white placeholder:text-white/30 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all" placeholder="Enter your last name" type="text"/>
<span class="material-symbols-outlined absolute left-4 text-white/40 group-focus-within:text-primary transition-colors">badge</span>
</div>
</label>
<!-- Date of Birth -->
<label class="group flex flex-col gap-2">
<div class="flex justify-between items-end">
<span class="text-white/80 text-base font-medium ml-1">Date of Birth</span>
<span class="text-white/40 text-xs italic mb-1">Must be 21+</span>
</div>
<div class="relative flex items-center">
<input class="w-full h-14 rounded-xl bg-surface-dark border border-white/10 px-4 pl-12 text-lg text-white placeholder:text-white/30 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all [color-scheme:dark]" placeholder="Select date" type="date"/>
<span class="material-symbols-outlined absolute left-4 text-white/40 group-focus-within:text-primary transition-colors">calendar_today</span>
</div>
</label>
</div>
<div class="flex-grow"></div> <!-- Spacer to push buttons down -->
<!-- Navigation Buttons -->
<div class="w-full mt-8 pb-4 flex flex-col gap-3">
<button class="w-full h-14 rounded-xl bg-primary text-background-dark text-lg font-bold shadow-[0_4px_20px_rgba(17,212,66,0.3)] hover:bg-primary/90 active:scale-[0.99] transition-all flex items-center justify-center gap-2">
                Next Step
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<button class="w-full h-12 rounded-xl text-white/60 text-base font-medium hover:text-white hover:bg-white/5 transition-all">
                Back
            </button>
</div>
</div>
</body></html>
