<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Security Loading State</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0fbd0f",
                        "background-light": "#f6f8f6",
                        "background-dark": "#111811", // Matching the provided component bg
                        "card-dark": "#1c271c", // Slightly lighter for cards
                        "shimmer-base": "#1c271c",
                        "shimmer-highlight": "#2a3b2a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    animation: {
                        shimmer: "shimmer 1.5s infinite linear",
                    },
                    keyframes: {
                        shimmer: {
                            "0%": { backgroundPosition: "-1000px 0" },
                            "100%": { backgroundPosition: "1000px 0" },
                        },
                    },
                },
            },
        }
    </script>
<style>
        .shimmer {
            background: linear-gradient(to right, #1c271c 4%, #283928 25%, #1c271c 36%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite linear;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display antialiased overflow-hidden">
<!-- Main Content Area -->
<div class="flex-1 flex flex-col relative overflow-y-auto pb-24">
<!-- Header -->
<div class="sticky top-0 z-10 flex items-center bg-[#111811] p-4 pb-2 justify-between border-b border-[#283928]">
<div class="text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-white/10 transition-colors cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Security</h2>
</div>
<!-- Status Hero Section (Skeleton) -->
<div class="flex p-6 flex-col items-center justify-center gap-6 mt-4">
<div class="relative">
<!-- Circular Badge Placeholder -->
<div class="w-32 h-32 rounded-full shimmer bg-[#1c271c] relative flex items-center justify-center">
<div class="w-24 h-24 rounded-full bg-[#111811]"></div>
</div>
<!-- Status Text Placeholders -->
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-20 h-6 rounded-full shimmer"></div>
</div>
<div class="flex flex-col items-center gap-2 w-full max-w-xs">
<div class="h-6 w-3/4 rounded shimmer"></div>
<div class="h-4 w-1/2 rounded shimmer"></div>
</div>
</div>
<!-- Settings List (Skeleton) -->
<div class="flex flex-col gap-1 px-4 mt-4">
<!-- Section Header -->
<div class="px-2 py-3">
<div class="h-5 w-32 rounded shimmer"></div>
</div>
<!-- Card 1: Toggle Type -->
<div class="flex items-center gap-4 bg-[#1c271c] px-4 py-4 rounded-xl border border-[#283928]/50">
<div class="flex flex-col gap-2 flex-1">
<div class="h-4 w-1/2 rounded shimmer"></div>
<div class="h-3 w-3/4 rounded shimmer opacity-60"></div>
</div>
<div class="shrink-0">
<div class="w-12 h-7 rounded-full shimmer"></div>
</div>
</div>
<!-- Card 2: Toggle Type -->
<div class="flex items-center gap-4 bg-[#1c271c] px-4 py-4 rounded-xl border border-[#283928]/50 mt-2">
<div class="flex flex-col gap-2 flex-1">
<div class="h-4 w-2/3 rounded shimmer"></div>
<div class="h-3 w-5/6 rounded shimmer opacity-60"></div>
<div class="h-3 w-1/2 rounded shimmer opacity-60"></div>
</div>
<div class="shrink-0">
<div class="w-12 h-7 rounded-full shimmer"></div>
</div>
</div>
<!-- Section Header -->
<div class="px-2 py-3 mt-4">
<div class="h-5 w-40 rounded shimmer"></div>
</div>
<!-- Card 3: Chevron Type -->
<div class="flex items-center gap-4 bg-[#1c271c] px-4 py-4 rounded-xl border border-[#283928]/50">
<div class="flex flex-col gap-2 flex-1">
<div class="h-4 w-1/3 rounded shimmer"></div>
</div>
<div class="shrink-0 text-[#9db99d]/30">
<div class="w-6 h-6 rounded shimmer opacity-50"></div>
</div>
</div>
<!-- Card 4: Toggle Type -->
<div class="flex items-center gap-4 bg-[#1c271c] px-4 py-4 rounded-xl border border-[#283928]/50 mt-2">
<div class="flex flex-col gap-2 flex-1">
<div class="h-4 w-1/2 rounded shimmer"></div>
<div class="h-3 w-full rounded shimmer opacity-60"></div>
</div>
<div class="shrink-0">
<div class="w-12 h-7 rounded-full shimmer"></div>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="fixed bottom-0 left-0 right-0 z-20 flex gap-2 border-t border-[#283928] bg-[#1c271c] px-4 pb-6 pt-2">
<a class="just flex flex-1 flex-col items-center justify-end gap-1 text-[#9db99d]" href="#">
<div class="text-[#9db99d] flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">speed</span>
</div>
</a>
<a class="just flex flex-1 flex-col items-center justify-end gap-1 rounded-full text-white" href="#">
<div class="text-white flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[24px] font-variation-settings-'FILL'1">shield_lock</span>
</div>
</a>
<a class="just flex flex-1 flex-col items-center justify-end gap-1 text-[#9db99d]" href="#">
<div class="text-[#9db99d] flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">group</span>
</div>
</a>
<a class="just flex flex-1 flex-col items-center justify-end gap-1 text-[#9db99d]" href="#">
<div class="text-[#9db99d] flex h-8 items-center justify-center">
<span class="material-symbols-outlined text-[24px]">settings</span>
</div>
</a>
</div>
</body></html>
