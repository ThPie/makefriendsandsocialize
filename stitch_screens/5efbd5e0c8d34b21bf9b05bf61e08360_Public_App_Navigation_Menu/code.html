<!DOCTYPE html>

                extend: {
                    colors: {
                        "primary": "#11d442",

                        "background-dark": "#102215",

                },
            },

<style>
    body {

<body class="bg-deep-forest text-white antialiased font-display h-screen w-full overflow-hidden flex flex-col">
<!-- Background Effects -->
<div class="fixed inset-0 pointer-events-none z-0">

<div class="absolute top-[-10%] right-[-10%] w-[80vw] h-[80vw] bg-primary/5 rounded-full blur-3xl opacity-40"></div>
<div class="absolute bottom-[-10%] left-[-20%] w-[100vw] h-[100vw] bg-gold-accent/5 rounded-full blur-3xl opacity-30"></div>

<div class="absolute inset-0 backdrop-blur-md bg-deep-forest/80"></div>
</div>

<div class="relative z-10 flex flex-col h-full w-full max-w-md mx-auto">

<header class="pt-12 px-6 pb-4 flex items-center justify-between shrink-0">

<span class="material-symbols-outlined text-[28px]">diamond</span>

</button>
</header>

<nav class="flex-1 overflow-y-auto px-6 py-4 flex flex-col justify-center space-y-1">

<span class="material-symbols-outlined text-gold-muted group-hover:text-gold-accent transition-colors text-[28px] font-light opacity-80">chevron_right</span>
</a>
<!-- Item: Ethos -->
<a class="group flex items-center justify-between py-5 border-b border-white/5 active:bg-white/5 transition-colors -mx-4 px-4 rounded-lg" href="#">
<span class="text-4xl font-light tracking-tight text-white/90 group-hover:text-gold-accent transition-colors">Ethos</span>
<span class="material-symbols-outlined text-gold-muted group-hover:text-gold-accent transition-colors text-[28px] font-light opacity-80">chevron_right</span>
</a>
<!-- Item: Collections -->

<span class="text-4xl font-light tracking-tight text-white/90 group-hover:text-gold-accent transition-colors">Collections</span>
<span class="material-symbols-outlined text-gold-muted group-hover:text-gold-accent transition-colors text-[28px] font-light opacity-80">chevron_right</span>
</a>
<!-- Item: Events -->

<span class="material-symbols-outlined text-gold-muted group-hover:text-gold-accent transition-colors text-[28px] font-light opacity-80">chevron_right</span>
</a>
<!-- Item: Journal -->
<a class="group flex items-center justify-between py-5 border-b border-white/5 active:bg-white/5 transition-colors -mx-4 px-4 rounded-lg" href="#">
<span class="text-4xl font-light tracking-tight text-white/90 group-hover:text-gold-accent transition-colors">Journal</span>
<span class="material-symbols-outlined text-gold-muted group-hover:text-gold-accent transition-colors text-[28px] font-light opacity-80">chevron_right</span>
</a>
