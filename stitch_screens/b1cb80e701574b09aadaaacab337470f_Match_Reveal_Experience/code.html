<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Match Reveal Experience</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#14b822",
                        "primary-dark": "#0f8a1a",
                        "background-light": "#f6f8f6",
                        "background-dark": "#051105", /* Deep forest green */
                        "gold-accent": "#D4AF37",
                        "gold-glow": "#F6E08B",
                        "surface-dark": "#0a1f0a",
                    },
                    fontFamily: {
                        "display": ["Noto Serif", "serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                    boxShadow: {
                        'gold-glow': '0 0 20px -5px rgba(212, 175, 55, 0.5)',
                        'inner-glow': 'inset 0 0 50px rgba(0,0,0,0.5)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        /* Custom particle simulation for background */
        .particle-bg {
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 215, 0, 0.15) 1px, transparent 1px),
                radial-gradient(circle at 90% 80%, rgba(255, 215, 0, 0.1) 1.5px, transparent 1.5px),
                radial-gradient(circle at 50% 50%, rgba(255, 215, 0, 0.05) 2px, transparent 2px),
                radial-gradient(circle at 30% 70%, rgba(255, 215, 0, 0.12) 1px, transparent 1px),
                radial-gradient(circle at 70% 30%, rgba(255, 215, 0, 0.08) 1.5px, transparent 1.5px);
            background-size: 100% 100%;
        }
        
        /* Frosted glass blur overlay */
        .frosted-blur {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        
        /* Shimmer animation for gold border */
        @keyframes shimmer-border {
            0% { border-color: rgba(212, 175, 55, 0.3); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
            50% { border-color: rgba(212, 175, 55, 1); box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); }
            100% { border-color: rgba(212, 175, 55, 0.3); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        }
        
        .gold-pulse {
            animation: shimmer-border 3s infinite ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display overflow-hidden">
<!-- Main Container -->
<div class="relative flex h-screen w-full flex-col items-center justify-between particle-bg">
<!-- Ambient Background Glows -->
<div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-[#14b822]/10 to-transparent pointer-events-none"></div>
<div class="absolute bottom-0 right-0 w-2/3 h-1/3 bg-gradient-to-t from-gold-accent/5 to-transparent rounded-full blur-3xl pointer-events-none"></div>
<!-- Top Bar -->
<div class="w-full flex items-center justify-between p-4 z-10">
<div class="w-10"></div> <!-- Spacer for centering -->
<div class="flex items-center gap-1 opacity-70">
<span class="material-symbols-outlined text-gold-accent text-sm">auto_awesome</span>
<span class="text-xs tracking-widest uppercase font-bold text-gold-accent">Premium Match</span>
</div>
<button class="flex size-10 items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-colors backdrop-blur-sm text-white/80">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col items-center justify-center w-full max-w-md px-6 z-10">
<!-- Header Text -->
<div class="text-center mb-8 animate-float">
<h1 class="text-3xl md:text-4xl font-bold leading-tight bg-clip-text text-transparent bg-gradient-to-b from-white via-white to-white/70 drop-shadow-lg">
                    A New Connection<br/>Awaits
                </h1>
<p class="text-white/60 text-sm mt-2 font-light italic">
                    Someone nearby matches your preferences
                </p>
</div>
<!-- Central Card (Reveal Target) -->
<div class="relative w-full aspect-[3/4] max-h-[420px] rounded-2xl overflow-hidden group">
<!-- Gold Shimmer Border Container -->
<div class="absolute -inset-[2px] rounded-2xl bg-gradient-to-tr from-gold-accent/20 via-gold-accent/60 to-gold-accent/20 opacity-80 blur-sm gold-pulse"></div>
<!-- Card Inner -->
<div class="relative h-full w-full bg-surface-dark rounded-2xl overflow-hidden shadow-2xl shadow-black/50 border border-white/10">
<!-- The Hidden Image -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="Portrait of a young woman with a warm smile, currently obscured by a frosted glass effect" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBesTLOAAfoKYh6CR20zdkiPoOBSY6FK9C5BGgFqvVSjvau-H5A5TSblrftfplm1JI5wyy6zUy_bka71Gc8NiCgAnLJSQdhJIZFWN6wda6B1ZmF8JfWQGuZuicPW-zOkMRMQ41n1IevxX-qW1iNTRodGWechCmZz0SUwmE0oruw655UyAEutZqwI7uZ0ZCMpz8k_1zx8IU1AwMlFSg_GRKw7nJxr2E7-FcbFoQlWslR8CAeESQDJfpSNvXfvp1a86FTCK25iH5JY4A');">
</div>
<!-- Overlay Gradient -->
<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
<!-- Frosted Glass Reveal Layer (This would animate opacity to 0 on reveal) -->
<div class="absolute inset-0 bg-white/5 frosted-blur flex flex-col items-center justify-center transition-all duration-1000 ease-in-out">
<div class="size-16 rounded-full border border-white/20 bg-black/20 backdrop-blur-md flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-3xl text-white/80">lock</span>
</div>
</div>
<!-- Hidden Info (Visible but blurred initially) -->
<div class="absolute bottom-0 left-0 w-full p-6 text-center transform translate-y-2 group-hover:translate-y-0 transition-transform duration-500">
<div class="bg-black/30 backdrop-blur-md rounded-xl p-3 inline-block border border-white/5">
<h3 class="text-xl font-bold text-white mb-0.5 filter blur-[6px]">Sarah, 24</h3>
<div class="flex items-center justify-center gap-1 text-white/70 text-xs font-medium filter blur-[4px]">
<span class="material-symbols-outlined text-[14px]">location_on</span>
                                2 miles away
                            </div>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Actions -->
<div class="w-full max-w-md px-6 pb-8 pt-4 z-20 bg-gradient-to-t from-background-dark via-background-dark/90 to-transparent">
<div class="flex flex-col items-center gap-4">
<p class="text-white/50 text-xs font-medium tracking-wide flex items-center gap-2">
<span class="size-1.5 rounded-full bg-primary animate-pulse"></span>
                    Reveal requires <span class="text-white font-bold">5 credits</span>
</p>
<button class="group relative w-full h-14 overflow-hidden rounded-xl bg-primary hover:bg-primary-dark active:scale-[0.98] transition-all duration-300 shadow-[0_0_20px_rgba(20,184,34,0.3)] hover:shadow-[0_0_30px_rgba(20,184,34,0.5)]">
<!-- Shimmer effect on button -->
<div class="absolute inset-0 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite] bg-gradient-to-r from-transparent via-white/20 to-transparent z-10"></div>
<div class="relative z-20 flex items-center justify-center gap-3 h-full px-6">
<span class="font-bold text-white text-lg tracking-wide">Reveal Match</span>
<div class="flex items-center justify-center bg-black/20 rounded-md px-2 py-0.5 text-xs font-bold text-white/90 border border-white/10">
<span class="material-symbols-outlined text-[14px] mr-1 text-gold-accent">bolt</span>
                            -5
                        </div>
</div>
</button>
<button class="text-white/40 text-sm font-medium hover:text-white/70 transition-colors py-2">
                    Maybe later
                </button>
</div>
</div>
</div>
</body></html>
