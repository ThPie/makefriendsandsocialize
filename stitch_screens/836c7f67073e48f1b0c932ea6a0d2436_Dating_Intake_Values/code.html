<style>
        /* Custom Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #ec135b;
            border: 2px solid #fff;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(236, 19, 91, 0.5);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #543b43;
            border-radius: 2px;
        }

        /* For Custom Radio Selection */
        .radio-card:has(input:checked) {
            background-color: rgba(236, 19, 91, 0.15);
            border-color: #ec135b;
        }
        .radio-card:has(input:checked) .radio-indicator {
            border-color: #ec135b;
            background-color: #ec135b;
        }
        .radio-card:has(input:checked) .radio-indicator::after {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Chips */
        .chip:has(input:checked) {
            background-color: #ec135b;
            color: white;
            border-color: #ec135b;
        }
    </style>
<style>
