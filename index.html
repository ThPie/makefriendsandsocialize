<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>MakeFriends | Private Social Club for Professionals</title>
    <meta name="description" content="A private social club for professionals who value authentic connections. Weekly curated events, vetted members, genuine friendships and meaningful business connections." />
    <meta name="robots" content="index, follow" />
    <meta name="keywords" content="private social club, networking events, professional community, curated events, membership club, social networking, business connections, NYC events" />
    <link rel="canonical" href="https://makefriends.social" />
    
    <!-- Theme Color for Mobile -->
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MakeFriends" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="MakeFriends | Private Social Club for Professionals" />
    <meta property="og:description" content="Weekly curated events. Vetted members. Genuine friendships and meaningful business connections." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://makefriends.social" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="MakeFriends Social Club" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MakeFriendsSocial" />
    <meta name="twitter:title" content="MakeFriends | Private Social Club for Professionals" />
    <meta name="twitter:description" content="Weekly curated events. Vetted members. Genuine friendships and meaningful business connections." />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MakeFriends Social Club",
      "url": "https://makefriends.social",
      "logo": "https://makefriends.social/logo.png",
      "description": "A private social club for professionals who value authentic connections.",
      "sameAs": [
        "https://instagram.com/makefriends",
        "https://linkedin.com/company/makefriends",
        "https://tiktok.com/@makefriends"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "hello@makefriends.social"
      }
    }
    </script>
    
    <!-- Preconnect for external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://lh3.googleusercontent.com" />
    <link rel="dns-prefetch" href="https://qzqomqctuqldexnxgmlh.supabase.co" />
    
    <!-- Material Symbols with font-display swap -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
    
    <!-- Manifest for PWA -->
    <link rel="manifest" href="/manifest.json" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
