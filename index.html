<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes" />

  <!-- Capacitor/Native App Compatibility -->
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MakeFriends" />
  <title>MakeFriends | Private Social Club for Professionals</title>
  <meta name="description"
    content="A private social club for professionals who value authentic connections. Weekly curated events, vetted members, genuine friendships and meaningful business connections." />
  <meta name="robots" content="index, follow" />
  <meta name="keywords"
    content="private social club, networking events, professional community, curated events, membership club, social networking, business connections, NYC events" />
  <link rel="canonical" href="https://makefriendsandsocialize.com" />

  <!-- Theme Color for Mobile Browsers -->
  <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />

  <!-- Open Graph / Facebook -->
  <meta property="og:title" content="MakeFriends | Private Social Club for Professionals" />
  <meta property="og:description"
    content="Weekly curated events. Vetted members. Genuine friendships and meaningful business connections." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://makefriendsandsocialize.com" />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:site_name" content="MakeFriends Social Club" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@MakeFriendsSocial" />
  <meta name="twitter:title" content="MakeFriends | Private Social Club for Professionals" />
  <meta name="twitter:description"
    content="Weekly curated events. Vetted members. Genuine friendships and meaningful business connections." />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MakeFriends Social Club",
      "url": "https://makefriendsandsocialize.com",
      "logo": "https://makefriendsandsocialize.com/logo.png",
      "description": "A private social club for professionals who value authentic connections.",
      "sameAs": [
        "https://instagram.com/makefriends",
        "https://linkedin.com/company/makefriends",
        "https://tiktok.com/@makefriends"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "hello@makefriendsandsocialize.com"
      }
    }
    </script>

  <!-- Preconnect for external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="preconnect" href="https://lh3.googleusercontent.com" />
  <link rel="dns-prefetch" href="https://qzqomqctuqldexnxgmlh.supabase.co" />

  <!-- Optimized Font Loading -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
  </noscript>



  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.ico" />
</head>

<body>
  <noscript>
    <div style="padding: 2rem; text-align: center; font-family: sans-serif;">
      <h1 style="color: #052e16;">JavaScript Required</h1>
      <p>MakeFriends Social Club requires JavaScript to function. Please enable it in your browser settings to continue.
      </p>
    </div>
  </noscript>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
